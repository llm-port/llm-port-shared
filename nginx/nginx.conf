# llm.port — nginx reverse proxy
#
# Single public entrypoint unifying frontend + backend + API gateway
# under one origin so the frontend's relative-path API calls (/api/*)
# work from any browser, local or remote.

# WebSocket connection upgrade map (must precede server block)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend {
    server llm-port-backend:8000;
}

upstream frontend {
    server llm-port-frontend:3000;
}

upstream gateway {
    server llm-port-api:8000;
}

server {
    listen 80;
    server_name _;

    # Max upload size (file attachments, RAG documents)
    client_max_body_size 100m;

    # ── Backend API (/api/*) ──────────────────────────────────────
    # The frontend calls /api/* with httponly cookies.
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming: disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── OpenAI-compatible API (/v1/*) ─────────────────────────────
    # External API clients (curl, SDKs) can hit /v1/* through the
    # same origin instead of needing a separate port.
    location /v1/ {
        proxy_pass http://gateway;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── Frontend (everything else) ────────────────────────────────
    # React SSR served by react-router-serve.
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
