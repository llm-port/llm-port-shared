# llm.port — nginx reverse proxy
#
# Single public entrypoint unifying frontend + backend + API gateway
# under one origin so the frontend's relative-path API calls (/api/*)
# work from any browser, local or remote.

# WebSocket connection upgrade map (must precede server block)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Docker embedded DNS — re-resolve container IPs dynamically so
    # restarting an upstream container doesn't require an nginx restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Max upload size (file attachments, RAG documents)
    client_max_body_size 100m;

    # ── Health check (local only, no upstream) ────────────────────
    location /healthz {
        access_log off;
        return 200 'ok';
    }

    # ── Backend API (/api/*) ──────────────────────────────────────
    # The frontend calls /api/* with httponly cookies.
    location /api/ {
        set $backend http://llm-port-backend:8000;
        proxy_pass $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming: disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── OpenAI-compatible API (/v1/*) ─────────────────────────────
    # External API clients (curl, SDKs) can hit /v1/* through the
    # same origin instead of needing a separate port.
    location /v1/ {
        set $gateway http://llm-port-api:8000;
        proxy_pass $gateway;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── Gateway static assets (Swagger UI / ReDoc JS+CSS) ───────
    # The gateway serves JS/CSS from /static/docs/*. This location
    # makes those assets reachable via /gateway-static/* so the
    # rewritten HTML (see sub_filter below) can load them.
    location /gateway-static/ {
        set $gw_static http://llm-port-api:8000;
        rewrite ^/gateway-static/(.*)$ /static/$1 break;
        proxy_pass $gw_static;
        proxy_set_header Host              $host;
    }

    # ── Gateway API docs (iframe-friendly path) ──────────────────
    # Proxies /gateway-docs/* → llm-port-api /api/*
    location /gateway-docs/ {
        set $gateway_docs http://llm-port-api:8000;
        rewrite ^/gateway-docs/(.*)$ /api/$1 break;
        proxy_pass $gateway_docs;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite absolute asset paths in Swagger/ReDoc HTML so they
        # load through /gateway-static/ and /gateway-docs/ instead of
        # hitting the backend (/api/) or the frontend catch-all (/static/).
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '/static/docs/' '/gateway-static/docs/';
        sub_filter '/api/openapi.json' '/gateway-docs/openapi.json';
    }

    # ── Grafana (proxied for remote access) ────────────────────
    location /grafana/ {
        set $grafana http://llm-port-grafana:3000;
        proxy_pass $grafana;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Grafana Live
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── Frontend (everything else) ────────────────────────────────
    # React SSR served by react-router-serve.
    location / {
        set $frontend http://llm-port-frontend:3000;
        proxy_pass $frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
