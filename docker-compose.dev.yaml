services:
  llm-port-api:
    build:
      context: ../llm_port_api
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../llm_port_api:/app/src
    environment:
      LLM_PORT_API_RELOAD: "true"
    command:
      - /usr/local/bin/python
      - -m
      - llm_port_api

  # Optional: RAG service dev overrides (only started with --profile rag)
  llm-port-rag:
    profiles: ["rag"]
    build:
      context: ../llm_port_rag
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../llm_port_rag:/app/src
    environment:
      LLM_PORT_RAG_RELOAD: "true"
    command:
      - /usr/local/bin/python
      - -m
      - llm_port_rag

  llm-port-rag-worker:
    profiles: ["rag"]
    build:
      context: ../llm_port_rag
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../llm_port_rag:/app/src
    command:
      - taskiq
      - worker
      - llm_port_rag.tkq:broker
      - --reload

  llm-port-rag-scheduler:
    profiles: ["rag"]
    build:
      context: ../llm_port_rag
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../llm_port_rag:/app/src
    command:
      - /usr/local/bin/python
      - -m
      - llm_port_rag.workers.scheduler

  # Optional: PII service dev overrides (only started with --profile pii)
  llm-port-pii:
    profiles: ["pii"]
    build:
      context: ../llm_port_pii
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../llm_port_pii:/app/src
    environment:
      LLM_PORT_PII_RELOAD: "true"
    command:
      - /usr/local/bin/python
      - -m
      - llm_port_pii

  llm-port-pii-worker:
    profiles: ["pii"]
    build:
      context: ../llm_port_pii
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../llm_port_pii:/app/src
    command:
      - taskiq
      - worker
      - llm_port_pii.tkq:broker
      - --reload
